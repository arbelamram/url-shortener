name: Resolve Code Review Issues Check

on:
  issues:
    types: [closed]

jobs:
  unblock-pr:
    # Only run for issues auto-generated by the code reviewer bot
    if: |
      contains(github.event.issue.labels.*.name, 'code-review') &&
      github.event.issue.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      issues: read
      statuses: write
      pull-requests: read

    steps:
      - name: Extract PR number from issue body
        id: extract
        # Pass body through env variable to prevent script injection
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          PR_NUM=$(echo "$ISSUE_BODY" | grep -oP 'PR #\K[0-9]+' | head -1)
          if [ -z "$PR_NUM" ]; then
            echo "No PR number found in issue body — skipping"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          fi

      - name: Check remaining open issues for this PR
        if: steps.extract.outputs.pr_number != ''
        id: check
        # Pass step outputs through env variables to prevent script injection
        env:
          PR_NUMBER: ${{ steps.extract.outputs.pr_number }}
        uses: actions/github-script@v8
        with:
          script: |
            const raw = process.env.PR_NUMBER || '';
            // Strict digit-only check before parseInt; guarantees prNum is a safe integer
            // with no special characters that could affect the search query.
            if (!/^\d+$/.test(raw)) {
              core.setFailed(`Invalid PR number format: "${raw}"`);
              return;
            }
            const prNum = parseInt(raw, 10);
            if (!Number.isSafeInteger(prNum) || prNum <= 0) {
              core.setFailed('PR number out of safe integer range');
              return;
            }

            // prNum is a validated positive integer — safe to interpolate into search query.
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open label:code-review "PR #${prNum}" in:body`;
            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 100,
            });

            const remaining = searchResult.total_count;
            core.info(`Open code-review issues for PR #${prNum}: ${remaining}`);
            core.setOutput('remaining', remaining.toString());

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNum,
            });
            core.setOutput('head_sha', pr.head.sha);

      - name: Update commit status when all issues resolved
        if: |
          steps.extract.outputs.pr_number != '' &&
          steps.check.outputs.remaining == '0'
        env:
          HEAD_SHA: ${{ steps.check.outputs.head_sha }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.HEAD_SHA,
              state: 'success',
              description: 'All code review issues have been resolved',
              context: 'code-review/issues',
            });
            core.info('Commit status updated to success — PR is now unblocked');

      - name: Leave status as failure when issues remain
        if: |
          steps.extract.outputs.pr_number != '' &&
          steps.check.outputs.remaining != '0'
        env:
          HEAD_SHA: ${{ steps.check.outputs.head_sha }}
          REMAINING: ${{ steps.check.outputs.remaining }}
        uses: actions/github-script@v8
        with:
          script: |
            const remaining = parseInt(process.env.REMAINING, 10);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.HEAD_SHA,
              state: 'failure',
              description: `${remaining} code review issue(s) must be resolved before merging`,
              context: 'code-review/issues',
            });
            core.info(`${remaining} issue(s) still open — PR remains blocked`);
